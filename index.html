<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<style>
:root { --hw-blue:#004593; --hw-light:#eef4fb; --hw-green:#28a745; --sidebar:380px; }
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; padding-bottom:120px; }

/* Kirjautuminen */
#loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--hw-blue); display:flex; justify-content:center; align-items:center; z-index:10000; }
.login-box { background:white; padding:30px; border-radius:15px; width:320px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
#appWrapper { display:none; }

.main-wrapper { display:flex; max-width:1550px; margin:0 auto; gap:20px; padding:15px; align-items:flex-start; }
.content-area { flex:1; min-width:0; }

/* Lomakekentät */
.form-box { background:white; padding:25px; border-radius:12px; border:2px solid var(--hw-blue); margin-bottom:20px; box-shadow:0 3px 12px rgba(0,0,0,0.08); }
.form-box h2 { margin-top:0; color:var(--hw-blue); font-size:22px; text-align:center; margin-bottom:20px; }
.form-row { display:flex; flex-direction:column; margin-bottom:15px; }
.form-row label { font-weight:600; margin-bottom:5px; color:#003366; }
.form-row input, .form-row textarea { padding:12px; border:2px solid #cfd6e3; border-radius:8px; font-size:15px; }
.required-label::after { content:" *"; color:red; }

header { background:white; padding:15px; border-radius:12px; border-bottom:4px solid var(--hw-blue); text-align:center; margin-bottom:15px; position:sticky; top:0; z-index:1000; }
.search-box { width:100%; padding:15px; border:2px solid #ddd; border-radius:8px; font-size:16px; box-sizing:border-box; }
.nav-dropdown { width:100%; padding:10px; margin-top:10px; border-radius:8px; background:var(--hw-light); font-weight:bold; cursor:pointer; width:100%; }

.category-block { margin-top:35px; scroll-margin-top:200px; }
.category-name { background:var(--hw-blue); color:white; padding:10px 15px; border-radius:8px; font-weight:bold; text-transform:uppercase; }

.product-item { display:grid; grid-template-columns:40px 1fr auto; gap:12px; padding:12px; border-bottom:1px solid #eee; background:white; align-items:center; }
.product-thumb { width:40px; height:40px; object-fit:cover; border-radius:6px; cursor:pointer; opacity:0; transition:0.3s; }
.product-name { font-weight:600; cursor:pointer; color:var(--hw-blue); text-decoration:underline; }

.qty-controls { display:flex; align-items:center; gap:5px; }
.qty-btn { width:32px; height:32px; border:none; background:#f0f0f0; color:var(--hw-blue); cursor:pointer; font-weight:bold; border-radius:6px; }

.sidebar { width:var(--sidebar); position:sticky; top:10px; height:calc(100vh - 20px); background:white; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:flex; flex-direction:column; border:2px solid var(--hw-blue); }
.sidebar-header { background:var(--hw-blue); color:white; padding:15px; text-align:center; font-weight:bold; }
.sidebar-content { flex:1; overflow-y:auto; padding:12px; }

.basket-item { padding:10px; background:#fff; display:flex; justify-content:space-between; border-bottom:1px solid #eee; }
.btn-send { width:100%; padding:18px; background:var(--hw-green); color:white; border:none; border-radius:10px; font-size:18px; font-weight:bold; cursor:pointer; }

/* Modaalit */
#imgModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:11000; }
#modalImage { max-width:90%; max-height:90%; border-radius:10px; }

/* Suositusikkuna */
#relatedOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:12000; justify-content:center; align-items:center; }
.related-box { background:white; padding:25px; border-radius:15px; width:90%; max-width:500px; text-align:center; }

@media (max-width: 900px) {
    .main-wrapper { flex-direction: column; }
    .sidebar { position: fixed; top: 0; right: -100%; width: 320px; height: 100vh; z-index: 5000; transition: 0.3s; }
    .sidebar.open { right: 0; }
}
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--hw-blue)">Kirjaudu Varaosakauppaan</h2>
        <input id="uField" placeholder="Käyttäjä" style="width:90%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px;">
        <input id="pField" type="password" placeholder="Salasana" style="width:90%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:8px;">
        <button onclick="doLogin()" style="width:95%; padding:14px; background:var(--hw-blue); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">KIRJAUDU</button>
    </div>
</div>

<div id="appWrapper">
    <div id="imgModal" onclick="this.style.display='none'"><img id="modalImage"></div>

    <div id="relatedOverlay">
        <div class="related-box">
            <h3>Tilaussuositus</h3>
            <p id="relatedText"></p>
            <button onclick="document.getElementById('relatedOverlay').style.display='none'" style="padding:10px 20px; background:var(--hw-blue); color:white; border:none; border-radius:8px; cursor:pointer;">Selvä</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="content-area">
            <div class="form-box">
                <h2>Tilaustiedot</h2>
                <div class="form-row"><label class="required-label">Tilaaja</label><input id="f_tilaaja"></div>
                <div class="form-row"><label class="required-label">Varastonumero</label><input id="f_varasto"></div>
                <div class="form-row"><label class="required-label">Päivämäärä</label><input id="f_pvm" type="date"></div>
                <div class="form-row"><label class="required-label">Toimitustapa</label><input id="f_tapa" placeholder="Esim. Posti, Nouto"></div>
                <div class="form-row"><label class="required-label">Osoite</label><input id="f_osoite"></div>
                <div class="form-row"><label class="required-label">Postinumero</label><input id="f_postinro"></div>
                <div class="form-row"><label class="required-label">Paikkakunta</label><input id="f_paikka"></div>
                <div class="form-row"><label>Lisätiedot</label><textarea id="f_lisa" rows="2"></textarea></div>
                <div class="form-row"><label>Listalta puuttuvat (Syötä nimi ja määrä)</label><textarea id="f_puuttuvat" rows="2"></textarea></div>
            </div>
            
            <header>
                <input id="filter" class="search-box" placeholder="Hae tuotetta tai koodia..." oninput="render(this.value)">
                <select id="cat-nav" class="nav-dropdown" onchange="jumpTo(this.value)"></select>
            </header>
            <div id="main-list"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">OSTOSKORI (<span id="basket-count">0</span>)</div>
            <div id="basket-items" class="sidebar-content"></div>
            <div style="padding:15px;">
                <button class="btn-send" onclick="finalSubmit()">LÄHETÄ TILAUS</button>
                <button onclick="location.reload()" style="width:100%; margin-top:20px; color:red; border:none; background:none; cursor:pointer;">Kirjaudu ulos</button>
            </div>
        </div>
    </div>
</div>

<script>
let data = {}; let cart = {};

function doLogin() {
    if(document.getElementById("uField").value === "tomppa" && document.getElementById("pField").value === "Tomi7122") {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appWrapper").style.display = "block";
        document.getElementById("f_pvm").valueAsDate = new Date();
        loadData();
    } else { alert("Virhe!"); }
}

async function loadData() {
    const resp = await fetch("data.txt");
    const text = await resp.text();
    data = parseData(text);
    render();
}

function parseData(text) {
    const lines = text.split("\n");
    let cats = {}; let curr = null;
    lines.forEach(l => {
        const t = l.trim(); if(!t) return;
        const hasNumber = /\d/.test(t.split(" ")[0]);
        if(!hasNumber) { curr = t; cats[curr] = []; }
        else if(curr) { cats[curr].push({ code: t.split(" ")[0], name: t.substring(t.indexOf(" ")).trim() }); }
    });
    return cats;
}

function render(filter = "") {
    const cont = document.getElementById("main-list"); cont.innerHTML = "";
    const nav = document.getElementById("cat-nav"); nav.innerHTML = `<option value="">-- Hyppää kategoriaan --</option>`;
    
    Object.keys(data).forEach(cat => {
        const prods = data[cat].filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.toLowerCase().includes(filter.toLowerCase()));
        if(prods.length === 0) return;
        nav.innerHTML += `<option value="${cat}">${cat}</option>`;
        const block = document.createElement("div"); block.className = "category-block"; block.id = cat;
        block.innerHTML = `<div class="category-name">${cat}</div>`;
        prods.forEach(p => {
            const row = document.createElement("div"); row.className = "product-item";
            row.innerHTML = `
                <img class="product-thumb" id="img_${p.code}" onclick="openImage('${p.code}')">
                <div style="flex:1"><div class="product-name" onclick="openImage('${p.code}')">${p.name}</div><div style="font-size:11px;color:#666">${p.code}</div></div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="changeQty('${p.code}', -1)">-</button>
                    <span id="qty_${p.code}" style="min-width:20px;text-align:center;font-weight:bold;">${cart[p.code]?.qty || 0}</span>
                    <button class="qty-btn" onclick="changeQty('${p.code}', 1)">+</button>
                </div>`;
            block.appendChild(row);
            const img = new Image(); img.onload = () => { const e = document.getElementById("img_"+p.code); e.src=`images/${p.code}.png`; e.style.opacity="1"; };
            img.src = `images/${p.code}.png`;
        });
        cont.appendChild(block);
    });
}

function changeQty(code, delta) {
    if(!cart[code]) {
        let name = ""; for(let c in data) { let p = data[c].find(x => x.code === code); if(p){ name=p.name; break; } }
        cart[code] = { name, qty: 0 };
    }
    cart[code].qty += delta;
    if(cart[code].qty <= 0) delete cart[code];
    
    // Suosituslogiikka (esimerkki)
    if(delta > 0 && code === "12345") { // Jos lisätään tietty osa
        document.getElementById("relatedText").textContent = "Huom! Tähän osaan suositellaan myös tiivistettä (koodi 999).";
        document.getElementById("relatedOverlay").style.display = "flex";
    }

    document.getElementById("qty_"+code).textContent = cart[code]?.qty || 0;
    updateCart();
}

function updateCart() {
    const div = document.getElementById("basket-items"); div.innerHTML = "";
    Object.keys(cart).forEach(code => {
        div.innerHTML += `<div class="basket-item"><span><b>${cart[code].qty} kpl</b> - ${cart[code].name}</span></div>`;
    });
    document.getElementById("basket-count").textContent = Object.keys(cart).length;
}

function finalSubmit() {
    const fields = {
        tilaaja: document.getElementById("f_tilaaja").value,
        varasto: document.getElementById("f_varasto").value,
        pvm: document.getElementById("f_pvm").value,
        tapa: document.getElementById("f_tapa").value,
        osoite: document.getElementById("f_osoite").value,
        postinro: document.getElementById("f_postinro").value,
        paikka: document.getElementById("f_paikka").value,
        lisa: document.getElementById("f_lisa").value,
        puuttuvat: document.getElementById("f_puuttuvat").value
    };

    if(!fields.tilaaja || !fields.varasto || !fields.pvm || !fields.tapa || !fields.osoite || !fields.postinro || !fields.paikka) {
        alert("Täytä kaikki tähdellä merkityt pakolliset kentät!"); return;
    }

    const subject = `Varaosatilaus: ${fields.tilaaja} / ${fields.varasto}`;
    let body = `HARTWALL VARAOSATILAUS\n====================\n`;
    body += `Tilaaja: ${fields.tilaaja}\nVarastonumero: ${fields.varasto}\nPvm: ${fields.pvm}\nToimitustapa: ${fields.tapa}\nOsoite: ${fields.osoite}, ${fields.postinro} ${fields.paikka}\n\n`;
    if(fields.lisa) body += `Lisätiedot: ${fields.lisa}\n`;
    if(fields.puuttuvat) body += `Listalta puuttuvat: ${fields.puuttuvat}\n`;
    body += `\nTILATUT TUOTTEET:\n`;
    Object.keys(cart).forEach(code => { body += `- ${cart[code].qty} kpl : ${cart[code].name} (${code})\n`; });

    window.location.href = `mailto:tomi.eskola@hartwall.fi?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function jumpTo(id) { document.getElementById(id).scrollIntoView({ behavior: "smooth" }); }
function openImage(code) { document.getElementById("modalImage").src = `images/${code}.png`; document.getElementById("imgModal").style.display = "flex"; }
</script>
</body>
</html>
