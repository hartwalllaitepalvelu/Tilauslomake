name: Update Stock

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Parse SAP report
       run: |
  echo "=== DEBUG: Näytetään sap_report.txt ==="
  cat sap_report.txt
  echo "=== DEBUG: Ajetaan parseri ==="
  python update_stock.py
