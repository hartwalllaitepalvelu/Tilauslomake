<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>

<style>
:root {
    --hw-blue:#004593;
    --hw-light:#eef4fb;
    --hw-green:#28a745;
    --sidebar:380px;
}

/* YLEINEN TYYLI */
body {
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:#f0f2f5;
    font-size:14px;
    color:#333;
    padding-bottom:120px;
}

.main-wrapper {
    display:flex;
    max-width:1550px;
    margin:0 auto;
    gap:20px;
    padding:15px;
    align-items:flex-start;
}

.content-area {
    flex:1;
    min-width:0;
}

/* POPUP OVERLAY */
#relatedOverlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.65);
    z-index:6000;
    justify-content:center;
    align-items:center;
}

/* POPUP IKKUNA */
#relatedPopup {
    background:white;
    width:420px;
    max-width:90%;
    border-radius:12px;
    box-shadow:0 6px 25px rgba(0,0,0,0.35);
    overflow:hidden;
    animation:fadeIn 0.25s ease-out;
}

/* POPUP OTSIKKO */
#relatedHeader {
    background:var(--hw-blue);
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}

/* POPUP SISÄLTÖ */
#relatedContent {
    padding:20px;
    max-height:60vh;
    overflow-y:auto;
    font-size:15px;
}

/* SUOSITUSNIMIKKEET */
.related-item {
    padding:10px 12px;
    background:#f7f9fc;
    border-left:4px solid var(--hw-blue);
    margin-bottom:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.related-btn {
    background:var(--hw-green);
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* SULJE-NAPPI */
#relatedClose {
    width:100%;
    padding:14px;
    background:#ddd;
    border:none;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

@keyframes fadeIn {
    from { opacity:0; transform:scale(0.95); }
    to { opacity:1; transform:scale(1); }
}
</style>
</head>
<body>
<div class="main-wrapper">

    <!-- SIVUPALKKI / OSTOSKORI -->
    <div id="cartSidebar" style="
        width:var(--sidebar);
        background:white;
        border-radius:12px;
        padding:15px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
        position:sticky;
        top:15px;
        height:fit-content;
    ">
        <h2 style="margin-top:0; color:var(--hw-blue);">Ostoskori</h2>
        <div id="cartItems"></div>

        <div style="margin-top:20px;">
            <label>Lisätiedot tilaukseen:</label>
            <textarea id="orderNotes" style="width:100%; height:80px;"></textarea>
        </div>

        <button id="sendOrderBtn" style="
            width:100%;
            margin-top:15px;
            padding:12px;
            background:var(--hw-blue);
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        ">Lähetä tilaus</button>
    </div>

    <!-- PÄÄSISÄLTÖ -->
    <div class="content-area">

        <!-- HAKUPALKKI -->
        <input id="searchInput" type="text" placeholder="Hae nimikettä..." 
            style="width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid #ccc; margin-bottom:15px;">

        <!-- NAVIGAATIO -->
        <div id="categoryTabs" style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;"></div>

        <!-- TUOTELISTA -->
        <div id="itemList"></div>
    </div>
</div>

<!-- SUOSITUS‑POPUP (MODAL) -->
<div id="relatedOverlay">
    <div id="relatedPopup">
        <div id="relatedHeader">Suositellut lisäosat</div>
        <div id="relatedContent"></div>
        <button id="relatedClose">Sulje</button>
    </div>
</div>
<script>
// =========================
//  TUOTEDATA
// =========================
const items = [
    { code:"V02363", name:"Caprice 1", category:"Caprice", image:"" },
    { code:"V02364", name:"Caprice 2", category:"Caprice", image:"" },
    { code:"V02355", name:"Caprice 3", category:"Caprice", image:"" },
    { code:"V02356", name:"Caprice 4", category:"Caprice", image:"" },

    // Lisää omia nimikkeitä tähän...
];

// =========================
//  SUOSITELLUT LISÄOSAT
// =========================
const relatedItems = {
    "V02363": ["V03010","V02257","V02351","T00457","T02256","T41430","T00613","T00609","T41101","T41002"],
    "V02364": ["V03010","V02257","V02351","T00457","T02256","T41430","T00613","T00609","T41101","T41002"],
    "V02355": ["V03010","V02257","V02351","T00457","T02256","T41430","T00613","T00609","T41101","T41002"],
    "V02356": ["V03010","V02257","V02351","T00457","T02256","T41430","T00613","T00609","T41101","T41002"]
};

// =========================
//  KATEGORIAT
// =========================
function renderCategories() {
    const categories = [...new Set(items.map(i => i.category))];
    const container = document.getElementById("categoryTabs");
    container.innerHTML = "";

    const allBtn = document.createElement("button");
    allBtn.textContent = "Kaikki";
    allBtn.style = categoryButtonStyle();
    allBtn.onclick = () => renderItems();
    container.appendChild(allBtn);

    categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.style = categoryButtonStyle();
        btn.onclick = () => renderItems(cat);
        container.appendChild(btn);
    });
}

function categoryButtonStyle() {
    return `
        padding:10px 14px;
        background:white;
        border:1px solid #ccc;
        border-radius:6px;
        cursor:pointer;
        font-size:14px;
    `;
}

// =========================
//  TUOTELISTAN RENDERÖINTI
// =========================
function renderItems(filterCategory = null, searchTerm = "") {
    const list = document.getElementById("itemList");
    list.innerHTML = "";

    let filtered = items;

    if (filterCategory) {
        filtered = filtered.filter(i => i.category === filterCategory);
    }

    if (searchTerm) {
        filtered = filtered.filter(i =>
            i.code.toLowerCase().includes(searchTerm.toLowerCase()) ||
            i.name.toLowerCase().includes(searchTerm.toLowerCase())
        );
    }

    filtered.forEach(item => {
        const div = document.createElement("div");
        div.style = `
            background:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;
            box-shadow:0 0 5px rgba(0,0,0,0.1);
            display:flex;
            justify-content:space-between;
            align-items:center;
        `;

        div.innerHTML = `
            <div>
                <strong>${item.code}</strong><br>
                ${item.name}
            </div>
            <button onclick="addToCart('${item.code}')" 
                style="padding:8px 12px; background:var(--hw-blue); color:white; border:none; border-radius:6px; cursor:pointer;">
                Lisää
            </button>
        `;

        list.appendChild(div);
    });
}

// =========================
//  HAKU
// =========================
document.getElementById("searchInput").addEventListener("input", e => {
    renderItems(null, e.target.value);
});
</script>
<script>
// =========================
//  OSTOSKORI
// =========================
let cart = {};

function addToCart(code) {
    if (!cart[code]) cart[code] = 0;
    cart[code]++;

    renderCart();

    // Jos tuotteella on suosituksia → avaa popup
    if (relatedItems[code]) {
        openRelatedPopup(code);
    }
}

function renderCart() {
    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    Object.keys(cart).forEach(code => {
        const item = items.find(i => i.code === code);
        if (!item) return;

        const row = document.createElement("div");
        row.style = `
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px 0;
            border-bottom:1px solid #eee;
        `;

        row.innerHTML = `
            <div>
                <strong>${code}</strong><br>
                ${item.name}
            </div>
            <div style="display:flex; gap:6px; align-items:center;">
                <button onclick="changeQty('${code}', -1)" 
                    style="padding:4px 8px;">-</button>
                ${cart[code]}
                <button onclick="changeQty('${code}', 1)" 
                    style="padding:4px 8px;">+</button>
            </div>
        `;

        container.appendChild(row);
    });
}

function changeQty(code, delta) {
    cart[code] += delta;
    if (cart[code] <= 0) delete cart[code];
    renderCart();
}

// =========================
//  SUOSITUS‑POPUP
// =========================
function openRelatedPopup(code) {
    const overlay = document.getElementById("relatedOverlay");
    const content = document.getElementById("relatedContent");

    content.innerHTML = ""; // tyhjennä vanhat

    const list = relatedItems[code];

    list.forEach(rel => {
        const div = document.createElement("div");
        div.className = "related-item";

        div.innerHTML = `
            <div><strong>${rel}</strong></div>
            <button class="related-btn" onclick="addRelated('${rel}')">Lisää</button>
        `;

        content.appendChild(div);
    });

    overlay.style.display = "flex";
}

function addRelated(code) {
    addToCart(code);
}

// =========================
//  POPUPIN SULKEMINEN
// =========================
document.getElementById("relatedClose").onclick = () => {
    document.getElementById("relatedOverlay").style.display = "none";
};

// Sulje popup klikkaamalla taustaa
document.getElementById("relatedOverlay").onclick = (e) => {
    if (e.target.id === "relatedOverlay") {
        document.getElementById("relatedOverlay").style.display = "none";
    }
};

// =========================
//  SIVUN ALUSTUS
// =========================
renderCategories();
renderItems();
renderCart();
</script>
<script>
// =========================
//  TILAUKSEN LÄHETYS
// =========================
document.getElementById("sendOrderBtn").onclick = () => {
    if (Object.keys(cart).length === 0) {
        alert("Ostoskori on tyhjä.");
        return;
    }

    const notes = document.getElementById("orderNotes").value;

    const order = {
        items: cart,
        notes: notes,
        timestamp: new Date().toLocaleString("fi-FI")
    };

    console.log("TILAUS LÄHETETTY:", order);

    alert("Tilaus lähetetty! (tällä hetkellä vain konsoliin)");

    // Tyhjennä kori
    cart = {};
    renderCart();
};
</script>

</body>
</html>
