name: Update Stock from SAP Report

on:
  schedule:
    - cron: "0 19 * * *"   # Ajaa joka päivä klo 19 Suomen aikaa
  workflow_dispatch:

jobs:
  update-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml imapclient

      - name: Fetch latest SAP report from Gmail
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        run: |
          python3 << 'EOF'
          import email
          import imapclient
          from bs4 import BeautifulSoup

          HOST = "${{ secrets.IMAP_HOST }}"
          PORT = int("${{ secrets.IMAP_PORT }}")
          USER = "${{ secrets.IMAP_USER }}"
          PASSWORD = "${{ secrets.IMAP_PASSWORD }}"

          # Connect to Gmail
          imap = imapclient.IMAPClient(HOST, ssl=True, port=PORT)
          imap.login(USER, PASSWORD)
          imap.select_folder("INBOX")

          # Search for SAP emails
          messages = imap.search(['FROM', 'sap', 'SUBJECT', 'report'])
          if not messages:
              print("No SAP report found.")
              exit(1)

          latest = messages[-1]
          msg_data = imap.fetch(latest, ['RFC822'])
          raw_email = msg_data[latest][b'RFC822']
          msg = email.message_from_bytes(raw_email)

          # Extract HTML attachment
          html_content = None
          for part in msg.walk():
              if part.get_content_type() == "text/html":
                  html_content = part.get_payload(decode=True)
                  break

          if not html_content:
              print("No HTML attachment found.")
              exit(1)

          # Parse HTML
          soup = BeautifulSoup(html_content, "lxml")
          rows = soup.find_all("tr")

          stock = {}
          for row in rows:
              cols = [c.get_text(strip=True) for c in row.find_all("td")]
              if len(cols) >= 2:
                  material = cols[0]
                  qty = cols[1]
                  if qty.isdigit():
                      stock[material] = int(qty)

          # Load data.txt
          with open("data.txt", "r", encoding="utf-8") as f:
              products = [line.strip() for line in f.readlines()]

          # Build stock.txt
          with open("stock.txt", "w", encoding="utf-8") as f:
              for p in products:
                  qty = stock.get(p, 0)
                  f.write(f"{p}:{qty}\n")

          print("Stock updated.")
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add stock.txt
          git commit -m "Update stock from SAP report" || echo "No changes to commit"
          git push
