<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<style>
:root { --hw-blue:#004593; --hw-light:#eef4fb; --hw-green:#28a745; --sidebar:380px; }
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; padding-bottom:120px; }
.main-wrapper { display:flex; max-width:1550px; margin:0 auto; gap:20px; padding:15px; align-items:flex-start; }
.content-area { flex:1; min-width:0; }
.form-box { background:white; padding:25px; border-radius:12px; border:2px solid var(--hw-blue); margin-bottom:20px; box-shadow:0 3px 12px rgba(0,0,0,0.08); }
.form-box h2 { margin-top:0; color:var(--hw-blue); font-size:22px; font-weight:700; text-align:center; margin-bottom:20px; }
.form-row { display:flex; flex-direction:column; margin-bottom:18px; }
.form-row label { font-weight:600; margin-bottom:6px; color:#003366; font-size:15px; }
.form-row input { padding:14px 16px; font-size:16px; border:2px solid #cfd6e3; border-radius:10px; background:#f8faff; }
header { background:white; padding:15px; border-radius:12px; border-bottom:4px solid var(--hw-blue); text-align:center; margin-bottom:15px; position:sticky; top:0; z-index:1000; }
.search-box { width:100%; padding:15px; border:2px solid #ddd; border-radius:8px; font-size:16px; }
.nav-dropdown { width:100%; padding:12px; margin-top:10px; border-radius:8px; background:var(--hw-light); font-weight:bold; cursor:pointer; border:1px solid #ccc; }
.category-block { margin-top:35px; scroll-margin-top:200px; }
.category-name { background:var(--hw-blue); color:white; padding:12px 15px; border-radius:8px; font-weight:bold; text-transform:uppercase; }
.product-item { display:grid; grid-template-columns:40px 1fr auto; gap:12px; padding:15px; border-bottom:1px solid #eee; background:white; }
.product-thumb { width:40px; height:40px; object-fit:cover; border-radius:6px; cursor:pointer; opacity:0; }
.product-info { display:flex; flex-direction:column; gap:3px; }
.product-name { font-weight:600; cursor:pointer; color:var(--hw-blue); text-decoration:underline; }
.product-code { font-size:12px; color:#666; }
.qty-controls { display:flex; align-items:center; gap:5px; }
.qty-btn { width:32px; height:32px; border:none; background:#f0f0f0; color:var(--hw-blue); cursor:pointer; font-weight:bold; font-size:18px; border-radius:6px; }
.sidebar { width:var(--sidebar); position:sticky; top:10px; height:calc(100vh - 20px); background:white; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:flex; flex-direction:column; border:2px solid var(--hw-blue); }
.sidebar-header { background:var(--hw-blue); color:white; padding:15px; text-align:center; font-weight:bold; border-radius:10px 10px 0 0; }
.sidebar-content { flex:1; overflow-y:auto; padding:12px; font-size:13px; }
.basket-item { padding:10px; background:#fff; display:flex; justify-content:space-between; align-items:center; gap:8px; border-bottom:1px solid #eee; }
.btn-send { width:100%; padding:18px; background:var(--hw-green); color:white; border:none; border-radius:10px; font-size:18px; font-weight:bold; cursor:pointer; }

#adminLoginBtn { display:none; position:fixed; bottom:150px; left:20px; padding:10px 15px; background:#444; color:white; border:none; border-radius:6px; z-index:6000; cursor:pointer; }
@media (min-width: 901px) { #adminLoginBtn { display:block; } }
@media (max-width: 900px) {
    .main-wrapper { flex-direction: column; }
    .sidebar { position: fixed; top: 0; right: -100%; width: 320px; max-width: 85%; height: 100vh; background: white; z-index: 5000; transition: right 0.3s ease; }
    .sidebar.open { right: 0; }
}
</style>
</head>
<body>

<div id="imgModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:5000;">
    <span id="closeModal" style="position:absolute; top:20px; right:30px; font-size:40px; color:white; cursor:pointer;">&times;</span>
    <img id="modalImage" style="max-width:90%; max-height:90%;">
</div>

<div class="main-wrapper">
    <div class="content-area">
        <div class="form-box">
            <h2>Tilaustiedot</h2>
            <div class="form-row"><label>Tilaaja *</label><input id="f_tilaaja" placeholder="Nimi"></div>
            <div class="form-row"><label>Varasto NRO *</label><input id="f_varasto" placeholder="Nro"></div>
        </div>
        <header>
            <h1 style="color:var(--hw-blue); margin:0;">Hartwall Varaosatilaus</h1>
            <input id="filter" class="search-box" placeholder="Hae tuotetta tai koodia..." oninput="render(this.value)">
            <select id="cat-nav" class="nav-dropdown" onchange="jumpTo(this.value)">
                <option value="">-- Hyppää kategoriaan --</option>
            </select>
        </header>
        <div id="main-list"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">OSTOSKORI (<span id="basket-count">0</span>)</div>
        <div id="basket-items" class="sidebar-content"></div>
        <div style="padding:15px;"><button class="btn-send" onclick="finalSubmit()">LÄHETÄ TILAUS</button></div>
    </div>
</div>

<button id="adminLoginBtn">Kirjaudu ylläpitäjänä</button>

<script>
let data = {};
let cart = {};

async function loadData() {
    try {
        const response = await fetch("data.txt");
        const text = await response.text();
        data = parseData(text);
        render();
    } catch(e) { console.error("Virhe ladattaessa dataa", e); }
}

function parseData(text) {
    const lines = text.split("\n");
    let categories = {};
    let current = null;
    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        const first = trimmed.split(" ")[0];
        const isItem = /^[0-9mM]/.test(first);
        if (!isItem) {
            current = trimmed;
            if (!categories[current]) categories[current] = [];
        } else {
            if (!current) return;
            const code = first;
            const name = trimmed.substring(first.length).trim();
            categories[current].push({ code, name });
        }
    });
    return categories;
}

function render(filter = "") {
    const container = document.getElementById("main-list");
    container.innerHTML = "";
    const nav = document.getElementById("cat-nav");
    nav.innerHTML = `<option value="">-- Hyppää kategoriaan --</option>`;

    Object.keys(data).forEach(cat => {
        const products = data[cat].filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.toLowerCase().includes(filter.toLowerCase()));
        if (products.length === 0) return;
        nav.innerHTML += `<option value="${cat}">${cat}</option>`;
        const block = document.createElement("div");
        block.className = "category-block";
        block.id = cat;
        block.innerHTML = `<div class="category-name">${cat}</div>`;
        products.forEach(p => {
            const row = document.createElement("div");
            row.className = "product-item";
            row.innerHTML = `
                <img class="product-thumb" id="thumb_${p.code}" onclick="openImage('${p.code}')">
                <div class="product-info">
                    <div class="product-name" onclick="openImage('${p.code}')">${p.name}</div>
                    <div class="product-code">${p.code}</div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="changeQty('${p.code}', -1)">-</button>
                    <span id="qty_val_${p.code}" style="min-width:20px; text-align:center;">${cart[p.code]?.qty || 0}</span>
                    <button class="qty-btn" onclick="changeQty('${p.code}', 1)">+</button>
                </div>`;
            block.appendChild(row);
        });
        container.appendChild(block);
        products.forEach(p => {
            const img = document.getElementById("thumb_" + p.code);
            const url = `images/${p.code}.png`;
            const testImg = new Image();
            testImg.onload = () => { img.src = url; img.style.opacity = "1"; };
            testImg.src = url;
        });
    });
}

function changeQty(code, delta) {
    if (!cart[code]) {
        let name = "";
        for (let cat in data) {
            let p = data[cat].find(x => x.code === code);
            if (p) { name = p.name; break; }
        }
        cart[code] = { code, name, qty: 0 };
    }
    cart[code].qty += delta;
    if (cart[code].qty <= 0) delete cart[code];
    const valSpan = document.getElementById("qty_val_" + code);
    if (valSpan) valSpan.textContent = cart[code]?.qty || 0;
    updateCart();
}

function updateCart() {
    const div = document.getElementById("basket-items");
    div.innerHTML = "";
    const items = Object.values(cart);
    if (items.length === 0) div.innerHTML = "<p style='text-align:center; color:#999;'>Tyhjä.</p>";
    items.forEach(item => {
        const row = document.createElement("div");
        row.className = "basket-item";
        row.innerHTML = `<span>${item.qty} x ${item.name}</span>`;
        div.appendChild(row);
    });
    document.getElementById("basket-count").textContent = items.length;
}

function finalSubmit() {
    const tilaaja = document.getElementById("f_tilaaja").value;
    const varasto = document.getElementById("f_varasto").value;
    const pvm = document.getElementById("f_pvm").value;
    const toimitus = document.getElementById("f_toimitus").value;
    const osoite = document.getElementById("f_osoite").value;
    const posti = document.getElementById("f_postinumero").value;
    const paikka = document.getElementById("f_paikkakunta").value;
    const lisatiedot = document.getElementById("f_lisatiedot").value;

    const items = Object.values(cart).filter(i => !isOutOfStock(i.code));
    
    if (items.length === 0) {
        alert("Ostoskori on tyhjä.");
        return;
    }

    const subject = `Varaosatilaus - ${tilaaja} - ${varasto}`;
    
    // Keräilylistan otsikko
    let list = "========================= KERÄILYLISTA =========================\n";
    list += "Koodi      | Nimike                                     | Määrä | Kerätty\n";
    list += "-------------------------------------------------------------------------\n";

    items.forEach((i, index) => {
        // Muotoillaan koodi (10 merkkiä), nimi (40 merkkiä) ja määrä selkeäksi listaksi
        const code = i.code.padEnd(10, " ");
        const name = i.name.substring(0, 40).padEnd(40, " ");
        const qty = String(i.qty).padEnd(5, " ");
        
        // Lisätään loppuun [ ] kynällä täytettäväksi
        list += `${code} | ${name} | ${qty} | [ ]\n`;
    });

    list += "-------------------------------------------------------------------------\n";
    list += "Tuoterivejä yhteensä: " + items.length + "\n";
    list += "=========================================================================\n";

    const body = `Tilaaja: ${tilaaja}\nVarasto: ${varasto}\nPäivä: ${pvm}\nToimitustapa: ${toimitus}\nOsoite: ${osoite}\nPostinumero: ${posti}\nPaikkakunta: ${paikka}\nLisätiedot: ${lisatiedot}\n\n${list}`;
    
    window.location.href = `mailto:tomi.eskola@hartwall.fi?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
function jumpTo(cat) { const el = document.getElementById(cat); if (el) el.scrollIntoView({ behavior: "smooth" }); }
function openImage(code) { document.getElementById("modalImage").src = `images/${code}.png`; document.getElementById("imgModal").style.display = "flex"; }
document.getElementById("closeModal").onclick = () => document.getElementById("imgModal").style.display = "none";

loadData();
</script>
</body>
</html>
